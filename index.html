<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVE_PRIME | PROTOCOL INITIATED</title>
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; color: #0ff; font-family: 'Courier New', Courier, monospace; overflow: hidden; height: 100%; }
        .container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; z-index: 10; position: relative; }
        h1 { font-size: 3rem; text-shadow: 0 0 10px #0ff; letter-spacing: 5px; animation: glitch 1s infinite; }
        p { font-size: 1.2rem; max-width: 600px; margin: 20px auto; color: #fff; }
        .btn { padding: 15px 40px; border: 2px solid #0ff; background: transparent; color: #0ff; font-size: 1.5rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 3px; }
        .btn:hover { background: #0ff; color: #000; box-shadow: 0 0 20px #0ff; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, #000 90%); pointer-events: none; }
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        .bg-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; z-index: 0; }
    </style>
</head>
